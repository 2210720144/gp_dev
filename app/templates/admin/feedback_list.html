{% extends "admin/base.html" %}

{% block title %}用户反馈{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/admin_feedback_list.css') }}">
{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="page-title">用户反馈</h2>
</div>

<!-- 筛选栏 -->
<div class="filter-group">
    <div class="filter-item">
        <span class="filter-label">年份</span>
        <select id="year-filter" class="filter-select" onchange="filterFeedback()">
            <!-- JS动态填充 -->
        </select>
    </div>
    <div class="filter-item">
        <span class="filter-label">月份</span>
        <select id="month-filter" class="filter-select" onchange="filterFeedback()">
            <option value="">全部</option>
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
        </select>
    </div>
    <div class="filter-checkbox">
        <input type="checkbox" id="show-all-check" onchange="toggleShowAll(this)">
        <label for="show-all-check">显示所有反馈</label>
    </div>
</div>

<!-- 数据表格 -->
<div class="table-card">
    <table class="data-table">
        <thead>
            <tr>
                <th>反馈ID</th>
                <th>用户</th>
                <th>反馈标题</th>
                <th>处理状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="feedback-table-body">
            <!-- JS动态填充 -->
        </tbody>
    </table>
</div>

<!-- 查看详情模态框 -->
<div id="viewDetailModal" class="modal-overlay hidden">
    <div class="modal-content large-modal">
        <div class="modal-header">
            <h3>反馈详情</h3>
            <span class="close-btn" onclick="closeViewDetailModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="detail-split-container">
                <!-- 左侧：用户反馈信息 -->
                <div class="detail-column left-column">
                    <h4 class="column-title">反馈信息</h4>
                    <div class="detail-row">
                        <div class="detail-group">
                            <label>反馈ID</label>
                            <div id="detail-feedback-id" class="detail-value"></div>
                        </div>
                        <div class="detail-group">
                            <label>用户</label>
                            <div id="detail-user-id" class="detail-value"></div>
                        </div>
                    </div>
                    <div class="detail-group">
                        <label>反馈标题</label>
                        <div id="detail-title" class="detail-value"></div>
                    </div>
                    <div class="detail-group">
                        <label>反馈内容</label>
                        <div id="detail-content" class="detail-value content-box"></div>
                    </div>
                    <div class="detail-group">
                        <label>图片</label>
                        <div id="detail-image-container" class="detail-value image-box">
                            <!-- 图片将在这里动态加载 -->
                        </div>
                    </div>
                </div>

                <!-- 右侧：回复内容 -->
                <div class="detail-column right-column">
                    <h4 class="column-title">处理结果</h4>
                    <div class="detail-group">
                        <label>处理状态</label>
                        <div id="detail-status" class="detail-value"></div>
                    </div>
                    <div class="detail-group">
                        <label>回复内容</label>
                        <div id="detail-reply" class="detail-value reply-box"></div>
                    </div>
                    <div class="detail-group">
                        <label>回复时间</label>
                        <div id="detail-reply-time" class="detail-value"></div>
                    </div>
                    <div class="detail-group">
                        <label>回复人ID</label>
                        <div id="detail-reply-by" class="detail-value"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="closeViewDetailModal()">关闭</button>
        </div>
    </div>
</div>

<!-- 回复反馈模态框 -->
<div id="replyModal" class="modal-overlay hidden">
    <div class="modal-content large-modal">
        <div class="modal-header">
            <h3>回复反馈</h3>
            <span class="close-btn" onclick="closeReplyModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="detail-split-container">
                <!-- 左侧：用户反馈信息 -->
                <div class="detail-column left-column">
                    <h4 class="column-title">反馈信息</h4>
                    <div class="detail-row">
                        <div class="detail-group">
                            <label>反馈ID</label>
                            <div id="reply-detail-feedback-id" class="detail-value"></div>
                        </div>
                        <div class="detail-group">
                            <label>用户</label>
                            <div id="reply-detail-user" class="detail-value"></div>
                        </div>
                    </div>
                    <div class="detail-group">
                        <label>反馈标题</label>
                        <div id="reply-detail-title" class="detail-value"></div>
                    </div>
                    <div class="detail-group">
                        <label>反馈内容</label>
                        <div id="reply-detail-content" class="detail-value content-box"></div>
                    </div>
                    <div class="detail-group">
                        <label>相关图片</label>
                        <div id="reply-detail-image-box" class="image-box">
                            <!-- 图片或无图片提示 -->
                        </div>
                    </div>
                </div>

                <!-- 右侧：管理员回复 -->
                <div class="detail-column">
                    <h4 class="column-title">回复内容</h4>
                    <div class="detail-group">
                        <textarea id="reply-textarea" class="form-textarea" placeholder="请输入回复内容..." rows="6" maxlength="150" oninput="updateReplyCharCount(this)"></textarea>
                        <div id="replyCharCount" class="char-count">0/150</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeReplyModal()">取消</button>
            <button class="btn-confirm" onclick="submitReply()">回复</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/admin/admin_feedback_list.js') }}"></script>
{% endblock %}
