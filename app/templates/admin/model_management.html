{% extends "admin/base.html" %}

{% block title %}模型管理{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/admin_model_management.css') }}?v=1.2">
{% endblock %}

{% block content %}
    <div class="page-header">
        <h2 class="page-title">模型管理</h2>
        <button class="create-btn" id="addModelBtn"><i class="fas fa-plus"></i> 添加模型</button>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>模型ID</th>
                        <th>模型名称</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 数据将通过 JS 动态加载 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 添加模型模态框 -->
    <div id="addModelModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加模型</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <form id="addModelForm">
                    <div class="form-group">
                        <label for="modelName">模型名称 <span class="required">*</span></label>
                        <input type="text" id="modelName" name="model_name" placeholder="请输入模型名称" required>
                    </div>
                    <div class="form-group">
                        <label>上传模型文件 <span class="required">*</span></label>
                        <div class="file-upload-area" id="dropArea">
                            <i class="fas fa-cloud-upload-alt upload-icon"></i>
                            <p>点击或拖拽文件到此处</p>
                            <p class="sub-text">支持 .pt, .onnx 等模型文件</p>
                            <input type="file" id="modelFileInput" name="model_file" accept=".pt,.onnx,.weights" hidden>
                        </div>
                        <div id="fileInfo" class="file-info hidden">
                            <i class="fas fa-file-code"></i>
                            <span id="fileName"></span>
                            <span id="removeFile" class="remove-file" title="移除文件">&times;</span>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" id="cancelBtn">取消</button>
                <button type="button" class="btn-confirm" id="confirmBtn">确定上传</button>
            </div>
        </div>
    </div>

    <!-- 查看/编辑详情模态框 -->
    <div id="viewModelModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>模型详情</h3>
                <span class="close-btn" onclick="closeViewModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="viewModelForm">
                    <input type="hidden" id="viewModelId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>模型ID</label>
                            <input type="text" id="viewId" readonly class="readonly-input">
                        </div>
                        <div class="form-group">
                            <label>模型名称 <span class="edit-tag">(可修改)</span></label>
                            <input type="text" id="viewName" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>模型路径</label>
                        <input type="text" id="viewPath" readonly class="readonly-input">
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <input type="text" id="viewStatus" readonly class="readonly-input">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>上传人ID</label>
                            <input type="text" id="viewUploader" readonly class="readonly-input">
                        </div>
                        <div class="form-group">
                            <label>上传时间</label>
                            <input type="text" id="viewTime" readonly class="readonly-input">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeViewModal()">取消</button>
                <button type="button" class="btn-confirm" onclick="saveModelDetail()">保存</button>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='js/admin/admin_model_management.js') }}"></script>
{% endblock %}
