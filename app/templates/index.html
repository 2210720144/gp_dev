<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业设计系统_主界面</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon/favicon.svg') }}">
    <!-- 增加版本号，便于刷新浏览器缓存 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}?v=3">
</head>
<body>

    <!-- 右上角登录/注册按钮 -->
    <a href="{{ url_for('auth.login_page') }}" class="auth-btn">登录 / 注册</a>

    <!-- 顶部标题区域 -->
    <div class="header">
        <h1 class="system-title">基于YOLO算法的校园单车违规停放智能检测与告警系统</h1>
    </div>

    <!-- 页面主体内容 -->
    <div class="main-content">
        <div class="icon-container">
            <!-- 自行车 SVG 图标 -->
            <svg class="bike-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="5.5" cy="17.5" r="3.5"/>
                <circle cx="18.5" cy="17.5" r="3.5"/>
                <path d="M15 6C15 6 16 5 17 5.5C18 6 17.5 7 17.5 7L13 14H10L8 8H6"/>
                <path d="M11 14L14 17.5"/>
                <path d="M5.5 17.5H18.5"/>
            </svg>
        </div>

        <div class="process-diagram">
            <!-- 流程图结构 -->
            <div class="process-flow">
                <span class="process-step">违停检测</span>
                <span class="process-arrow">&rarr;</span>
                <span class="process-step">智能识别</span>
                <span class="process-arrow">&rarr;</span>
                <span class="process-step">告警推送</span>
            </div>
        </div>

        <p class="description">智能检测单车违停，实时推送告警通知</p>
    </div>

</body>
</html>
