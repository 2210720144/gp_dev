<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕设系统_登录/注册页面</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}?v=4">
</head>
<body>

    <!-- Background Patterns -->
    <div class="bg-pattern">
        <svg class="bike-pattern" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5.5" cy="17.5" r="3.5" fill="none" stroke="currentColor" stroke-width="1"/>
            <circle cx="18.5" cy="17.5" r="3.5" fill="none" stroke="currentColor" stroke-width="1"/>
            <path d="M15 6C15 6 16 5 17 5.5C18 6 17.5 7 17.5 7L13 14H10L8 8H6" fill="none" stroke="currentColor" stroke-width="1"/>
            <path d="M11 14L14 17.5" fill="none" stroke="currentColor" stroke-width="1"/>
            <path d="M5.5 17.5H18.5" fill="none" stroke="currentColor" stroke-width="1"/>
        </svg>
    </div>

    <!-- Auth Container -->
    <div class="auth-container">
        <!-- Toggle Switch -->
        <div class="auth-toggle">
            <button id="login-tab" class="toggle-btn active" onclick="switchTab('login')">登录</button>
            <button id="register-tab" class="toggle-btn" onclick="switchTab('register')">注册</button>
        </div>

        <!-- 登录 -->
        <div id="login-form" class="auth-form active">
            <div class="input-group">
                <div class="input-icon">
                    <!-- User Icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <input type="text" placeholder="用户名/Email">
            </div>
            <div class="input-group">
                <div class="input-icon">
                    <!-- Lock Icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <input type="password" placeholder="密码" class="password-input">
                <div class="toggle-password" onclick="togglePassword(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-icon" style="display: none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-off-icon">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </div>
            </div>
            
            <button class="submit-btn">登录</button>
            
            <div class="form-footer">
                <a href="javascript:void(0)" onclick="showResetForm()" class="forgot-password">忘记密码？</a>
            </div>
        </div>

        <!-- 重置密码 -->
        <div id="reset-form" class="auth-form">
            <h2 class="form-title">重置密码</h2>
            
            <div class="input-group">
                <input type="email" placeholder="请输入邮箱">
            </div>
            <div class="input-group">
                <input type="password" placeholder="请输入新密码" class="password-input">
                <div class="toggle-password" onclick="togglePassword(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-icon" style="display: none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-off-icon">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </div>
            </div>
            <div class="input-group">
                <input type="password" placeholder="确认密码" class="password-input">
                <div class="toggle-password" onclick="togglePassword(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-icon" style="display: none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-off-icon">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </div>
            </div>
            <div class="input-group code-group">
                <input type="text" placeholder="请输入验证码">
                <button class="code-btn" onclick="sendCode(this)">发送验证码</button>
            </div>
            
            <button class="submit-btn">修改密码</button>
            
            <div class="form-footer">
                <a href="javascript:void(0)" onclick="switchTab('login')" class="forgot-password">没忘记密码，返回登录</a>
            </div>
        </div>

        <!-- 注册 -->
        <div id="register-form" class="auth-form">
            <div class="input-group">
                <input type="text" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <input type="email" placeholder="请输入邮箱">
            </div>
            <div class="input-group">
                <input type="password" placeholder="请输入密码" class="password-input">
                <div class="toggle-password" onclick="togglePassword(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-icon" style="display: none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-off-icon">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </div>
            </div>
            <div class="input-group">
                <input type="password" placeholder="请再次确认密码" class="password-input">
                <div class="toggle-password" onclick="togglePassword(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-icon" style="display: none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-off-icon">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </div>
            </div>
            <div class="input-group code-group">
                <input type="text" placeholder="请输入验证码">
                <button class="code-btn" onclick="sendCode(this)">发送验证码</button>
            </div>
            
            <button class="submit-btn register-submit">向管理员发送申请</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
